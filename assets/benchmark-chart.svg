<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" font-family="'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Space saved by corpus: data.txt 43.51%, Frankenstein 44.32%, Moby Dick 43.42%, Les Miserables 42.96%">
  <defs><linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0B1021"/><stop offset="1" stop-color="#161B33"/></linearGradient></defs>
  <rect width="760" height="320" rx="14" fill="url(#bgB)"/>
  <text x="30" y="34" font-size="15" font-weight="700" fill="#E2E8F0">Space Saved — real English-text corpora</text>
  <text x="30" y="54" font-size="12.5" fill="#64748B">Measured by running huffman.py on each file &#8226; 8 bits/char ASCII baseline</text>

  <!-- gridlines -->
  <g stroke="#1E293B" stroke-width="1">
    <line x1="220" y1="80"  x2="720" y2="80"/>
    <line x1="220" y1="140" x2="720" y2="140"/>
    <line x1="220" y1="200" x2="720" y2="200"/>
    <line x1="220" y1="260" x2="720" y2="260"/>
  </g>

  <!-- bars: scale 0-50% mapped to 0-460px width, base x=220 -->
  <g>
    <!-- data.txt: 43.51% -->
    <text x="30" y="86"  font-size="13" fill="#94A3B8">data.txt</text>
    <text x="30" y="100" font-size="10.5" fill="#475569">(lyrics, 4 KB)</text>
    <rect x="220" y="66" width="400" height="28" rx="5" fill="#38BDF8"/>
    <text x="632" y="86" font-size="13" font-weight="700" fill="#38BDF8">43.51%</text>

    <!-- franken-stein.txt: 44.32% -->
    <text x="30" y="146" font-size="13" fill="#94A3B8">Frankenstein</text>
    <text x="30" y="160" font-size="10.5" fill="#475569">(432 KB)</text>
    <rect x="220" y="126" width="407" height="28" rx="5" fill="#A78BFA"/>
    <text x="639" y="146" font-size="13" font-weight="700" fill="#A78BFA">44.32%</text>

    <!-- moby-dick.txt: 43.42% -->
    <text x="30" y="206" font-size="13" fill="#94A3B8">Moby Dick</text>
    <text x="30" y="220" font-size="10.5" fill="#475569">(1.2 MB)</text>
    <rect x="220" y="186" width="399" height="28" rx="5" fill="#34D399"/>
    <text x="631" y="206" font-size="13" font-weight="700" fill="#34D399">43.42%</text>

    <!-- les-miserable.txt: 42.96% -->
    <text x="30" y="266" font-size="13" fill="#94A3B8">Les Mis&#233;rables</text>
    <text x="30" y="280" font-size="10.5" fill="#475569">(3.1 MB)</text>
    <rect x="220" y="246" width="395" height="28" rx="5" fill="#F472B6"/>
    <text x="627" y="266" font-size="13" font-weight="700" fill="#F472B6">42.96%</text>
  </g>

  <text x="470" y="305" text-anchor="middle" font-size="11" fill="#475569">Consistently ~43&#8211;44% smaller across genres, eras, and file sizes &#8212; the theoretical entropy limit for single-character English text.</text>
</svg>
